spring:
  datasource:
    url: ${db_url}
    username: ${db_name}
    password: ${db_password}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${google_client_id}
            client-secret: ${google_client_secret_key}

  jpa:
    hibernate:
      ddl-auto: update

security:
  jwt:
    secret: ${jwt-secret-key}